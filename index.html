<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomorrowland 2026 W1 Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
.hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.hdr-title { font-size: 22px; font-weight: 600; letter-spacing: 0.02em; }
.hdr-sub { font-size: 13px; color: #777; }
.tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.tab { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #f5f5f5; color: #666; cursor: pointer; transition: all 0.15s; }
.tab:hover { background: #eee; }
.tab.active { background: #fff; color: #1a1a1a; font-weight: 600; border-color: #999; }
.controls { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.controls input { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; flex: 1; min-width: 160px; outline: none; }
.controls input:focus { border-color: #999; }
.vibe-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.vibe-btn { font-size: 11px; padding: 4px 11px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
.vibe-btn:not(.active) { opacity: 0.5; }
.vibe-btn.active { opacity: 1; }
.outer { overflow-x: auto; }
.grid-wrap { display: flex; }
.time-col { width: 46px; flex-shrink: 0; padding-top: 34px; }
.time-tick { height: 64px; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 8px; font-size: 10px; color: #999; font-weight: 500; }
.stages-area { flex: 1; display: flex; flex-direction: column; }
.stage-headers { display: flex; border-bottom: 1px solid #eee; }
.stage-hdr { font-size: 10px; font-weight: 600; color: #666; text-align: center; padding: 6px 3px; line-height: 1.3; text-transform: uppercase; letter-spacing: 0.03em; }
.grid-body { position: relative; }
.hour-line { position: absolute; left: 0; right: 0; border-bottom: 1px solid #f0f0f0; }
.col-div { position: absolute; top: 0; bottom: 0; border-left: 1px solid #f0f0f0; }
.act { position: absolute; border-radius: 5px; padding: 4px 6px; overflow: hidden; cursor: pointer; transition: opacity 0.12s, transform 0.1s; user-select: none; }
.act:hover { transform: scale(1.03); z-index: 10; }
.act.fav { outline: 2px solid #1a1a1a; outline-offset: -2px; z-index: 5; }
.act.dimmed { opacity: 0.08; pointer-events: none; }
.act-name { font-size: 11px; font-weight: 600; line-height: 1.25; }
.act-time { font-size: 9px; opacity: 0.65; margin-top: 2px; }
.act-heart { position: absolute; top: 3px; right: 4px; font-size: 11px; opacity: 0; transition: opacity 0.1s; }
.act.fav .act-heart { opacity: 1; }
.act:hover .act-heart { opacity: 0.5; }
.my-sched { padding: 1rem 0; }
.sched-empty { font-size: 13px; color: #888; padding: 1rem 0; }
.sched-list { display: flex; flex-direction: column; gap: 6px; }
.sched-day-title { font-size: 14px; font-weight: 600; margin: 14px 0 8px; }
.sched-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; border: 1px solid #eee; background: #fff; cursor: pointer; transition: background 0.1s; }
.sched-item:hover { background: #fafafa; }
.si-time { font-size: 11px; color: #888; min-width: 100px; }
.si-name { font-size: 13px; font-weight: 600; flex: 1; }
.si-stage { font-size: 11px; color: #888; }
.clash-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: #fff0f0; color: #c0392b; font-weight: 600; }
.fav-count { font-size: 11px; color: #888; margin-left: 3px; }
.tba-msg { padding: 2rem 0; color: #888; font-size: 13px; }
.tba-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.tba-pill { font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 20px; }

@media (prefers-color-scheme: dark) {
  body { background: #111; color: #f0f0f0; }
  .tab { background: #222; border-color: #444; color: #aaa; }
  .tab:hover { background: #2a2a2a; }
  .tab.active { background: #333; color: #f0f0f0; border-color: #777; }
  .controls input { background: #222; border-color: #444; color: #f0f0f0; }
  .controls input:focus { border-color: #888; }
  .stage-hdr { color: #aaa; }
  .hour-line { border-color: #222; }
  .col-div { border-color: #222; }
  .stage-headers { border-color: #333; }
  .act.fav { outline-color: #f0f0f0; }
  .sched-item { border-color: #333; background: #1a1a1a; }
  .sched-item:hover { background: #222; }
  .si-time, .si-stage, .fav-count { color: #aaa; }
  .clash-badge { background: #3a1a1a; color: #e74c3c; }
  .time-tick { color: #666; }
  .sched-empty, .tba-msg { color: #777; }
}
</style>
</head>

function fmt12(h) {
  const r = h % 24, ap = r >= 12 ? 'pm' : 'am', hr = r % 12 || 12;
  const m = Math.round((h % 1) * 60);
  return hr + (m ? ':' + m.toString().padStart(2,'0') : '') + ap;
}

function favKey(act) { return act.n + '|' + act.s + '|' + act.a; }

function saveFavs() {
  try { localStorage.setItem('tml26_favs', JSON.stringify([...favorites])); } catch(e) {}
}

function loadFavs() {
  try {
    const d = localStorage.getItem('tml26_favs');
    if(d) favorites = new Set(JSON.parse(d));
  } catch(e) {}
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('grid-view').style.display = t === 'grid' ? '' : 'none';
  document.getElementById('mysched-view').style.display = t === 'mysched' ? '' : 'none';
  document.querySelectorAll('#maintabs .tab').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&t==='grid')||(i===1&&t==='mysched'));
  });
  if(t === 'mysched') renderMySchedule();
}

function renderMySchedule() {
  const el = document.getElementById('myschedcontent');
  el.innerHTML = '';
  if(favorites.size === 0) {
    el.innerHTML = '<p class="sched-empty">Tap acts on the timetable to save them here. Your picks are saved to this browser.</p>';
    return;
  }
  const byDay = {};
  dayKeys.forEach(d => byDay[d] = []);
  favorites.forEach(k => {
    const parts = k.split('|');
    const n = parts[0], s = parts[1], a = parseFloat(parts[2]);
    const day = dayKeys.find(d => allDays[d] && allDays[d].find(x => x.n===n && x.s===s && x.a===a));
    if(day) {
      const act = allDays[day].find(x => x.n===n && x.s===s && x.a===a);
      if(act) byDay[day].push(act);
    }
  });

  dayKeys.forEach(d => {
    const acts = byDay[d].sort((a,b) => a.a - b.a);
    if(!acts.length) return;
    const h = document.createElement('div');
    h.className = 'sched-day-title';
    h.textContent = d;
    el.appendChild(h);
    const list = document.createElement('div');
    list.className = 'sched-list';
    acts.forEach((act, i) => {
      const clash = acts.some((b, j) => j !== i && b.a < act.b && b.b > act.a);
      const si = stageList.indexOf(act.s);
      const [bg, fg] = stageBg[si % stageBg.length];
      const item = document.createElement('div');
      item.className = 'sched-item';
      item.style.borderLeft = `3px solid ${fg}`;
      item.innerHTML = `<span class="si-time">${fmt12(act.a)}–${fmt12(act.b)}</span><span class="si-name">${act.n}</span><span class="si-stage">${act.s}</span>${clash ? '<span class="clash-badge">clash</span>' : ''}`;
      item.title = 'Tap to remove';
      item.onclick = () => { favorites.delete(favKey(act)); saveFavs(); updateFavCount(); renderMySchedule(); };
      list.appendChild(item);
    });
    el.appendChild(list);
  });

  const note = document.createElement('p');
  note.style.cssText = 'font-size:11px;color:#999;margin-top:12px;';
  note.textContent = 'Tap an item to remove it. Favorites are saved in your browser.';
  el.appendChild(note);
}

function updateFavCount() {
  document.getElementById('favcnt').textContent = favorites.size ? `(${favorites.size})` : '';
}

function buildDayTabs() {
  const el = document.getElementById('daytabs');
  el.innerHTML = '';
  dayKeys.forEach(d => {
    const b = document.createElement('button');
    b.className = 'tab' + (d === currentDay ? ' active' : '');
    b.textContent = d;
    b.onclick = () => { currentDay = d; renderGrid(); };
    el.appendChild(b);
  });
}

function buildVibeFilter() {
  const el = document.getElementById('vibebtns');
  el.innerHTML = '';
  Object.entries(vibeColors).forEach(([v, [bg, fg]]) => {
    const b = document.createElement('button');
    b.className = 'vibe-btn' + (activeVibe === v ? ' active' : '');
    b.style.cssText = `background:${bg};color:${fg};border-color:${fg};`;
    b.textContent = v;
    b.onclick = () => { activeVibe = activeVibe === v ? null : v; buildVibeFilter(); renderGrid(); };
    el.appendChild(b);
  });
}

function renderGrid() {
  buildDayTabs();
  const search = document.getElementById('search').value.toLowerCase().trim();
  const outer = document.getElementById('outer');
  outer.innerHTML = '';
  const acts = allDays[currentDay];

  if(!acts) {
    const tbaList = currentDay === "Sat Jul 18" ? satArtists : sunArtists;
    const div = document.createElement('div');
    div.className = 'tba-msg';
    div.innerHTML = '<strong style="display:block;margin-bottom:6px;color:#1a1a1a;">Set times not yet announced</strong>Confirmed artists for this day:';
    const pills = document.createElement('div');
    pills.className = 'tba-pills';
    const shown = search ? tbaList.filter(n => n.toLowerCase().includes(search)) : tbaList;
    shown.forEach((n, i) => {
      const [bg, fg] = stageBg[i % stageBg.length];
      const p = document.createElement('span');
      p.className = 'tba-pill';
      p.style.cssText = `background:${bg};color:${fg};`;
      p.textContent = n;
      pills.appendChild(p);
    });
    div.appendChild(pills);
    outer.appendChild(div);
    return;
  }

  const SW = Math.max(70, Math.floor(window.innerWidth > 900 ? 780 / stageList.length : 80));
  const gridH = (EH - SH) * PX;

  const wrap = document.createElement('div');
  wrap.className = 'grid-wrap';
  wrap.style.minWidth = (46 + stageList.length * SW) + 'px';

  const tc = document.createElement('div');
  tc.className = 'time-col';
  for(let h = SH; h <= EH; h++) {
    const t = document.createElement('div');
    t.className = 'time-tick';
    t.textContent = fmt12(h);
    tc.appendChild(t);
  }
  wrap.appendChild(tc);

  const sa = document.createElement('div');
  sa.className = 'stages-area';
  const hdrs = document.createElement('div');
  hdrs.className = 'stage-headers';
  stageList.forEach(s => {
    const h = document.createElement('div');
    h.className = 'stage-hdr';
    h.style.width = SW + 'px';
    h.textContent = s;
    hdrs.appendChild(h);
  });
  sa.appendChild(hdrs);

  const body = document.createElement('div');
  body.className = 'grid-body';
  body.style.height = gridH + 'px';

  for(let h = 0; h < EH - SH; h++) {
    const line = document.createElement('div');
    line.className = 'hour-line';
    line.style.top = (h * PX) + 'px';
    body.appendChild(line);
  }

  stageList.forEach((stage, si) => {
    const div = document.createElement('div');
    div.className = 'col-div';
    div.style.left = (si * SW) + 'px';
    body.appendChild(div);

    const [bg, fg] = stageBg[si];
    acts.filter(a => a.s === stage).forEach(act => {
      const top = (act.a - SH) * PX;
      const h = Math.max(22, (act.b - act.a) * PX - 2);
      const isFav = favorites.has(favKey(act));
      const inSearch = search ? act.n.toLowerCase().includes(search) : true;
      const inVibe = activeVibe ? act.v.includes(activeVibe) : true;
      const show = inSearch && inVibe;

      const el = document.createElement('div');
      el.className = 'act' + (isFav ? ' fav' : '') + (!show ? ' dimmed' : '');
      el.style.cssText = `top:${top}px;height:${h}px;left:${si*SW+2}px;width:${SW-4}px;background:${bg};color:${fg};`;

      const nm = document.createElement('div');
      nm.className = 'act-name';
      nm.textContent = act.n;
      el.appendChild(nm);

      if(h > 36) {
        const tm = document.createElement('div');
        tm.className = 'act-time';
        tm.textContent = fmt12(act.a) + '–' + fmt12(act.b);
        el.appendChild(tm);
      }

      const heart = document.createElement('div');
      heart.className = 'act-heart';
      heart.textContent = isFav ? '♥' : '♡';
      el.appendChild(heart);

      el.onclick = () => {
        const k = favKey(act);
        if(favorites.has(k)) favorites.delete(k);
        else favorites.add(k);
        saveFavs(); updateFavCount(); renderGrid();
      };

      body.appendChild(el);
    });
  });

  sa.appendChild(body);
  wrap.appendChild(sa);
  outer.appendChild(wrap);
}

document.getElementById('search').addEventListener('input', renderGrid);

loadFavs();
updateFavCount();
buildVibeFilter();
renderGrid();
</script>
</body>
</html>
